<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>응급실 테트리스</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060910;--card:#0d1117;--border:#1c2a3a;--main:#3b9eff;--text:#ddeeff;--text2:#6a8aaa;--text3:#2d4055;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 20%,rgba(59,158,255,0.04) 0%,transparent 70%);pointer-events:none;}

.back-btn{align-self:flex-start;display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;text-decoration:none;margin-bottom:16px;transition:all 0.2s;position:relative;z-index:1;}
.back-btn:hover{border-color:var(--main);color:var(--main);}

h1{font-size:18px;font-weight:900;margin-bottom:4px;position:relative;z-index:1;}
h1 span{color:var(--main);}
.subtitle{font-size:11px;color:var(--text2);margin-bottom:16px;text-align:center;position:relative;z-index:1;}

.game-area{display:flex;gap:14px;align-items:flex-start;justify-content:center;position:relative;z-index:1;}

#gameCanvas{border:2px solid var(--border);border-radius:10px;background:#070c14;display:block;touch-action:none;}

.side{display:flex;flex-direction:column;gap:8px;min-width:90px;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.panel-title{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.panel-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--text);}
#nextCanvas{border:1px solid var(--border);border-radius:6px;background:#070c14;display:block;}

.pause-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:7px;border-radius:8px;font-size:11px;cursor:pointer;font-family:inherit;width:100%;transition:all 0.2s;}
.pause-btn:hover{border-color:var(--main);color:var(--main);}

.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,9,16,0.9);border-radius:10px;gap:12px;z-index:10;}
.overlay-title{font-size:20px;font-weight:900;}
.overlay-sub{font-size:12px;color:var(--text2);text-align:center;line-height:1.8;}
.start-btn{background:var(--main);color:#000;border:none;padding:10px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}

.hint-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 20px;margin-top:14px;text-align:center;line-height:2;position:relative;z-index:1;}
.hint-box div{font-size:11px;color:var(--text2);}
</style>
</head>
<body>

<a class="back-btn" href="./index.html">← 응급실 현황</a>
<h1>🎮 <span>응급실</span> 테트리스</h1>
<p class="subtitle">대기하는 동안 한 판 어때요? 😂</p>

<div class="game-area">
  <div style="position:relative;">
    <canvas id="gameCanvas" width="200" height="400"></canvas>
    <div class="overlay" id="overlay">
      <div class="overlay-title">🌋 테트리스</div>
      <div class="overlay-sub">
        📱 탭 → 회전<br>
        👈👉 스와이프 → 이동<br>
        👇 스와이프 → 드롭<br>
        ⌨️ 키보드도 가능해요
      </div>
      <button class="start-btn" id="startBtn">게임 시작!</button>
    </div>
  </div>

  <div class="side">
    <div class="panel">
      <div class="panel-title">점수</div>
      <div class="panel-val" id="score">0</div>
    </div>
    <div class="panel">
      <div class="panel-title">레벨</div>
      <div class="panel-val" id="level">1</div>
    </div>
    <div class="panel">
      <div class="panel-title">라인</div>
      <div class="panel-val" id="lines">0</div>
    </div>
    <div class="panel">
      <div class="panel-title">다음</div>
      <canvas id="nextCanvas" width="80" height="80"></canvas>
    </div>
    <button class="pause-btn" id="pauseBtn" onclick="togglePause()">일시정지</button>
  </div>
</div>

<div class="hint-box">
  <div>👆 탭 → 회전 &nbsp;|&nbsp; 👇 스와이프 → 드롭</div>
  <div>👈👉 스와이프 → 좌우 이동</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nctx = nextCanvas.getContext('2d');

const COLS = 10, ROWS = 20, SZ = 20;

const SHAPES = [
  { cells: [[1,1,1,1]], color: '#00d4ff' },
  { cells: [[1,1],[1,1]], color: '#ffaa00' },
  { cells: [[0,1,0],[1,1,1]], color: '#a78bfa' },
  { cells: [[1,0,0],[1,1,1]], color: '#3b9eff' },
  { cells: [[0,0,1],[1,1,1]], color: '#ff8800' },
  { cells: [[0,1,1],[1,1,0]], color: '#22d47a' },
  { cells: [[1,1,0],[0,1,1]], color: '#ff4466' },
];

let board, cur, next, score, level, lines, timer, running, paused;

function mkBoard() {
  return Array.from({length:ROWS}, ()=>new Array(COLS).fill(null));
}

function mkPiece() {
  const s = SHAPES[Math.floor(Math.random()*SHAPES.length)];
  return {
    cells: s.cells.map(r=>[...r]),
    color: s.color,
    x: Math.floor(COLS/2) - Math.floor(s.cells[0].length/2),
    y: 0
  };
}

function rotate(cells) {
  return cells[0].map((_,i)=>cells.map(r=>r[i]).reverse());
}

function fits(cells, x, y) {
  for (let r=0; r<cells.length; r++)
    for (let c=0; c<cells[r].length; c++)
      if (cells[r][c]) {
        const nx=x+c, ny=y+r;
        if (nx<0||nx>=COLS||ny>=ROWS) return false;
        if (ny>=0 && board[ny][nx]) return false;
      }
  return true;
}

function drawBlock(c, x, y, color, alpha) {
  alpha = alpha||1;
  c.globalAlpha = alpha;
  c.fillStyle = color;
  c.fillRect(x*SZ+1, y*SZ+1, SZ-2, SZ-2);
  c.fillStyle = 'rgba(255,255,255,0.2)';
  c.fillRect(x*SZ+1, y*SZ+1, SZ-2, 3);
  c.fillStyle = 'rgba(0,0,0,0.15)';
  c.fillRect(x*SZ+1, y*SZ+SZ-4, SZ-2, 3);
  c.globalAlpha = 1;
}

function drawBoard() {
  ctx.fillStyle = '#070c14';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = 'rgba(28,42,58,0.4)';
  ctx.lineWidth = 0.5;
  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) ctx.strokeRect(c*SZ,r*SZ,SZ,SZ);

  for (let r=0;r<ROWS;r++) for (let c=0;c<COLS;c++) if(board[r][c]) drawBlock(ctx,c,r,board[r][c]);

  // 고스트
  let gy = cur.y;
  while (fits(cur.cells, cur.x, gy+1)) gy++;
  if (gy !== cur.y)
    for (let r=0;r<cur.cells.length;r++) for (let c=0;c<cur.cells[r].length;c++)
      if(cur.cells[r][c]) drawBlock(ctx, cur.x+c, gy+r, cur.color, 0.15);

  // 현재 블록
  for (let r=0;r<cur.cells.length;r++) for (let c=0;c<cur.cells[r].length;c++)
    if(cur.cells[r][c]) drawBlock(ctx, cur.x+c, cur.y+r, cur.color);
}

function drawNext() {
  nctx.fillStyle = '#070c14';
  nctx.fillRect(0,0,80,80);
  const s = next.cells;
  const ox = Math.floor((4-s[0].length)/2);
  const oy = Math.floor((4-s.length)/2);
  for (let r=0;r<s.length;r++) for (let c=0;c<s[r].length;c++)
    if(s[r][c]) drawBlock(nctx, ox+c, oy+r, next.color);
}

function lock() {
  for (let r=0;r<cur.cells.length;r++) for (let c=0;c<cur.cells[r].length;c++)
    if(cur.cells[r][c] && cur.y+r>=0) board[cur.y+r][cur.x+c] = cur.color;

  let cleared=0;
  for (let r=ROWS-1;r>=0;r--) {
    if (board[r].every(c=>c!==null)) {
      board.splice(r,1);
      board.unshift(new Array(COLS).fill(null));
      cleared++; r++;
    }
  }

  const pts=[0,100,300,500,800];
  score += (pts[Math.min(cleared,4)]||0)*level;
  lines += cleared;
  level = Math.floor(lines/10)+1;

  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;

  cur = next;
  next = mkPiece();
  drawNext();

  if (!fits(cur.cells, cur.x, cur.y)) { endGame(); return; }

  clearInterval(timer);
  timer = setInterval(tick, Math.max(80, 800-(level-1)*70));
}

function tick() {
  if (!running||paused) return;
  if (fits(cur.cells, cur.x, cur.y+1)) { cur.y++; drawBoard(); }
  else lock();
}

function move(dx) {
  if (!running||paused) return;
  if (fits(cur.cells, cur.x+dx, cur.y)) { cur.x+=dx; drawBoard(); }
}

function rotatePiece() {
  if (!running||paused) return;
  const r = rotate(cur.cells);
  if (fits(r, cur.x, cur.y)) { cur.cells=r; drawBoard(); }
  else if (fits(r, cur.x+1, cur.y)) { cur.cells=r; cur.x++; drawBoard(); }
  else if (fits(r, cur.x-1, cur.y)) { cur.cells=r; cur.x--; drawBoard(); }
}

function hardDrop() {
  if (!running||paused) return;
  while (fits(cur.cells, cur.x, cur.y+1)) cur.y++;
  lock();
}

function startGame() {
  board = mkBoard();
  score=0; level=1; lines=0; running=true; paused=false;
  cur = mkPiece();
  next = mkPiece();
  document.getElementById('score').textContent='0';
  document.getElementById('level').textContent='1';
  document.getElementById('lines').textContent='0';
  document.getElementById('overlay').style.display='none';
  document.getElementById('pauseBtn').textContent='일시정지';
  clearInterval(timer);
  timer = setInterval(tick, 800);
  drawNext(); drawBoard();
}

function endGame() {
  running=false; clearInterval(timer);
  const ov = document.getElementById('overlay');
  ov.style.display='flex';
  ov.innerHTML = `
    <div class="overlay-title">💀 게임 오버</div>
    <div class="overlay-sub">점수: <b style="color:var(--main)">${score.toLocaleString()}</b><br>레벨 ${level} · ${lines}라인</div>
    <button class="start-btn" onclick="startGame()">다시 하기!</button>
  `;
}

function togglePause() {
  if (!running) return;
  paused=!paused;
  document.getElementById('pauseBtn').textContent = paused?'계속하기':'일시정지';
  if (!paused) { clearInterval(timer); timer=setInterval(tick,Math.max(80,800-(level-1)*70)); }
  else clearInterval(timer);
}

// 키보드
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'){move(-1);e.preventDefault();}
  else if(e.key==='ArrowRight'){move(1);e.preventDefault();}
  else if(e.key==='ArrowDown'){tick();e.preventDefault();}
  else if(e.key==='ArrowUp'){rotatePiece();e.preventDefault();}
  else if(e.key===' '){hardDrop();e.preventDefault();}
  else if(e.key==='p'||e.key==='P') togglePause();
});

// 터치 스와이프 & 탭
let tx=0, ty=0, moved=false;
canvas.addEventListener('touchstart', e=>{
  tx=e.touches[0].clientX; ty=e.touches[0].clientY; moved=false;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  moved=true; e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  const adx=Math.abs(dx), ady=Math.abs(dy);
  if(adx<15&&ady<15){ rotatePiece(); }
  else if(adx>ady){ dx>0?move(1):move(-1); }
  else if(dy>30){ hardDrop(); }
  e.preventDefault();
},{passive:false});

document.getElementById('startBtn').addEventListener('click', startGame);
</script>
</body>
</html>
