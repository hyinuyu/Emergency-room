<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>응급실 현황판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #1e2d45;
    --accent: #00d4ff;
    --red: #ff4757;
    --orange: #ffa502;
    --green: #00ff88;
    --text: #e8f0fe;
    --text2: #7a8fa6;
    --text3: #4a5f75;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  .wrap { position: relative; max-width: 900px; margin: 0 auto; padding: 24px 16px; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo h1 { font-size: 18px; font-weight: 700; }
  .logo span { display: block; font-size: 11px; color: var(--text2); font-weight: 300; letter-spacing: 1px; }

  .refresh-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .spin { display: inline-block; }
  .spinning .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .meta {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .meta-item { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .meta-item b { color: var(--accent); }
  .live-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .notice {
    background: rgba(0,212,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .notice b { color: var(--accent); }

  .tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 20px;
    width: fit-content;
  }
  .tab {
    padding: 8px 20px; border-radius: 7px;
    font-size: 13px; font-weight: 500;
    cursor: pointer; border: none;
    background: none; color: var(--text2);
    font-family: inherit; transition: all 0.2s;
  }
  .tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  .search-wrap { position: relative; margin-bottom: 16px; }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px 10px 40px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); }

  .region-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .region-btn {
    padding: 5px 12px; border-radius: 20px; font-size: 12px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .region-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }

  .hospital-list { display: flex; flex-direction: column; gap: 10px; }
  .hospital-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    align-items: center;
    gap: 14px;
    transition: all 0.2s;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
  .hospital-card:hover { border-color: #2a3f5f; background: var(--surface2); }
  .hospital-card.favorited { border-color: rgba(0,212,255,0.3); }

  .star-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: none; background: var(--surface2);
    color: var(--text3); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .star-btn.starred { color: #ffd32a; background: rgba(255,211,42,0.1); }
  .star-btn:hover { transform: scale(1.15); }

  .hospital-info h3 { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .hospital-info p { font-size: 12px; color: var(--text3); }

  .bed-info { text-align: right; }
  .bed-count { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600; line-height: 1; }
  .bed-label { font-size: 11px; color: var(--text3); margin-top: 2px; }

  .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .status-green { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
  .status-orange { background: rgba(255,165,2,0.1); color: var(--orange); border: 1px solid rgba(255,165,2,0.2); }
  .status-red { background: rgba(255,71,87,0.1); color: var(--red); border: 1px solid rgba(255,71,87,0.2); }
  .status-gray { background: rgba(122,143,166,0.1); color: var(--text2); border: 1px solid var(--border); }

  .empty { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.8; }

  .fav-count {
    background: var(--accent); color: var(--bg);
    border-radius: 10px; padding: 1px 7px;
    font-size: 11px; font-weight: 700; margin-left: 6px;
  }

  .loading-msg { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }
  .err-box {
    background: rgba(255,71,87,0.1); border: 1px solid rgba(255,71,87,0.3);
    border-radius: 10px; padding: 14px 18px; font-size: 13px;
    color: #ff8a96; margin-bottom: 20px; display: none;
  }
  .err-box.show { display: block; }

  @media(max-width:600px){
    .hospital-card { grid-template-columns: auto 1fr auto; }
    .bed-info { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">
      <div class="logo-icon">🏥</div>
      <div>
        <h1>응급실 현황판</h1>
        <span>MY EMERGENCY ROOM DASHBOARD</span>
      </div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <span class="spin">↻</span> 새로고침
    </button>
  </header>

  <div class="meta">
    <div class="live-dot"></div>
    <div class="meta-item">마지막 갱신: <b id="lastUpdated">—</b></div>
    <div class="meta-item">즐겨찾기: <b id="favCount">0</b>개</div>
  </div>

  <div class="notice">
    ⭐ <b>별표</b>를 누르면 즐겨찾기 추가! 앱을 껐다 켜도 유지돼요.<br>
    🔄 실시간 응급실 가용병상 정보 (공공데이터 기반)
  </div>

  <div class="err-box" id="errBox"></div>

  <div class="tabs">
    <button class="tab active" id="tabAll" onclick="switchTab('all')">전체 병원</button>
    <button class="tab" id="tabFav" onclick="switchTab('fav')">⭐ 즐겨찾기 <span class="fav-count" id="favBadge">0</span></button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="병원 이름으로 검색..." oninput="renderList()">
  </div>

  <div class="region-filter" id="regionFilter"></div>
  <div class="hospital-list" id="hospitalList">
    <div class="loading-msg">🔄 데이터 불러오는 중...</div>
  </div>

</div>

<script>
const API_KEY = '1ae147a1907296a5c5fd16751a21b2f146381a4727784592ae9c235d8ac0263d';

let allHospitals = [];
let favorites = [];
let currentTab = 'all';
let currentRegion = '전체';

// Load favorites from localStorage
try { favorites = JSON.parse(localStorage.getItem('er_fav') || '[]'); } catch(e) {}

const SIDO_LIST = [
  '서울특별시','경기도','인천광역시','부산광역시',
  '대구광역시','광주광역시','대전광역시','울산광역시',
  '강원특별자치도','충청북도','충청남도','전북특별자치도',
  '전라남도','경상북도','경상남도','제주특별자치도'
];

function shortRegion(sido) {
  return sido.replace('특별자치도','').replace('특별자치시','').replace('광역시','').replace('특별시','').replace('도','').replace('시','').trim();
}

async function fetchSido(sido) {
  // 기본정보 API: 모든 응급의료기관 목록
  const url = `https://apis.data.go.kr/B552657/ErmctInfoInqireService/getEgytBassInfoInqire`
    + `?serviceKey=${encodeURIComponent(API_KEY)}`
    + `&Q0=${encodeURIComponent(sido)}`
    + `&pageNo=1&numOfRows=100`;
  const res = await fetch(url);
  const text = await res.text();
  const xml = new DOMParser().parseFromString(text, 'text/xml');
  const resultCode = xml.querySelector('resultCode')?.textContent;
  if (resultCode && resultCode !== '00') return [];
  const items = xml.querySelectorAll('item');
  const baseMap = {};
  items.forEach(item => {
    const g = tag => item.querySelector(tag)?.textContent?.trim() || '';
    const id = g('hpid');
    baseMap[id] = {
      id,
      name: g('dutyName'),
      address: g('dutyAddr'),
      region: shortRegion(sido),
      tel: g('dutyTel3'),
      hvec: null,
    };
  });
  // 실시간 병상정보 추가
  try {
    const url2 = `https://apis.data.go.kr/B552657/ErmctInfoInqireService/getEmrrmRltmUsefulSckbdInfoInqire`
      + `?serviceKey=${encodeURIComponent(API_KEY)}`
      + `&STAGE1=${encodeURIComponent(sido)}`
      + `&pageNo=1&numOfRows=100`;
    const res2 = await fetch(url2);
    const text2 = await res2.text();
    const xml2 = new DOMParser().parseFromString(text2, 'text/xml');
    xml2.querySelectorAll('item').forEach(item => {
      const g = tag => item.querySelector(tag)?.textContent?.trim() || '';
      const id = g('hpid');
      const beds = parseInt(g('hvec'));
      if (baseMap[id]) baseMap[id].hvec = isNaN(beds) ? null : beds;
    });
  } catch(e) {}
  return Object.values(baseMap);
}

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('hospitalList').innerHTML = '<div class="loading-msg">🔄 전국 응급실 정보 불러오는 중...</div>';
  showErr('');

  try {
    // Fetch all regions in parallel
    const results = await Promise.allSettled(
      SIDO_LIST.map(sido => fetchSido(sido))
    );
    const data = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);

    if (data.length > 0) {
      allHospitals = data;
      document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('ko-KR');
    } else {
      // Demo fallback
      allHospitals = demoData();
      showErr('⚠️ 실시간 API 연결 실패 — 샘플 데이터로 표시 중이에요. 잠시 후 새로고침해보세요.');
    }
  } catch(e) {
    allHospitals = demoData();
    showErr('⚠️ 네트워크 오류 — 샘플 데이터로 표시 중이에요.');
  }

  buildRegions();
  renderList();
  btn.classList.remove('spinning');
}

function demoData() {
  return [
    {id:'A001',name:'서울대학교병원',address:'서울 종로구 대학로 101',region:'서울',tel:'02-2072-2114',hvec:12},
    {id:'A002',name:'세브란스병원',address:'서울 서대문구 연세로 50-1',region:'서울',tel:'02-2228-1234',hvec:5},
    {id:'A003',name:'삼성서울병원',address:'서울 강남구 일원로 81',region:'서울',tel:'02-3410-2114',hvec:0},
    {id:'A004',name:'서울아산병원',address:'서울 송파구 올림픽로 43길 88',region:'서울',tel:'02-3010-3114',hvec:8},
    {id:'A005',name:'고려대 안암병원',address:'서울 성북구 인촌로 73',region:'서울',tel:'02-920-5114',hvec:3},
    {id:'B001',name:'아주대학교병원',address:'경기 수원시 영통구 월드컵로 164',region:'경기',tel:'031-219-5114',hvec:15},
    {id:'B002',name:'분당서울대병원',address:'경기 성남시 분당구 구미로 173번길 82',region:'경기',tel:'031-787-7114',hvec:7},
    {id:'B003',name:'가천대 길병원',address:'인천 남동구 남동대로 774번길 21',region:'인천',tel:'032-460-3114',hvec:9},
    {id:'C001',name:'부산대학교병원',address:'부산 서구 구덕로 179',region:'부산',tel:'051-240-7000',hvec:11},
    {id:'C002',name:'동아대학교병원',address:'부산 서구 대신공원로 26',region:'부산',tel:'051-240-2400',hvec:2},
    {id:'D001',name:'경북대학교병원',address:'대구 중구 동덕로 130',region:'대구',tel:'053-200-5114',hvec:6},
    {id:'E001',name:'전남대학교병원',address:'광주 동구 제봉로 42',region:'광주',tel:'062-220-5114',hvec:4},
    {id:'F001',name:'충남대학교병원',address:'대전 중구 문화로 282',region:'대전',tel:'042-280-7114',hvec:10},
    {id:'G001',name:'제주대학교병원',address:'제주 제주시 아란13길 15',region:'제주',tel:'064-717-1114',hvec:8},
  ];
}

function getStatus(beds) {
  if (beds === null) return {label:'정보없음', cls:'status-gray'};
  if (beds === 0) return {label:'만실', cls:'status-red'};
  if (beds <= 3) return {label:'혼잡', cls:'status-orange'};
  return {label:'여유', cls:'status-green'};
}

function bedColor(beds) {
  if (beds === null) return 'var(--text2)';
  if (beds === 0) return 'var(--red)';
  if (beds <= 3) return 'var(--orange)';
  return 'var(--green)';
}

function buildRegions() {
  const regions = ['전체', ...new Set(allHospitals.map(h => h.region).filter(Boolean).sort())];
  document.getElementById('regionFilter').innerHTML = regions.map(r =>
    `<button class="region-btn ${r===currentRegion?'active':''}" onclick="setRegion('${r}')">${r}</button>`
  ).join('');
}

function setRegion(r) {
  currentRegion = r;
  document.querySelectorAll('.region-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === r)
  );
  renderList();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabAll').classList.toggle('active', tab==='all');
  document.getElementById('tabFav').classList.toggle('active', tab==='fav');
  renderList();
}

function toggleFav(id, e) {
  e.stopPropagation();
  favorites = favorites.includes(id) ? favorites.filter(f=>f!==id) : [...favorites, id];
  try { localStorage.setItem('er_fav', JSON.stringify(favorites)); } catch(e) {}
  updateFavCount();
  renderList();
}

function updateFavCount() {
  const c = favorites.length;
  document.getElementById('favCount').textContent = c;
  document.getElementById('favBadge').textContent = c;
}

function renderList() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = [...allHospitals];
  if (currentTab === 'fav') list = list.filter(h => favorites.includes(h.id));
  if (currentRegion !== '전체') list = list.filter(h => h.region === currentRegion);
  if (search) list = list.filter(h => h.name.toLowerCase().includes(search) || (h.address||'').toLowerCase().includes(search));

  const el = document.getElementById('hospitalList');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty">
      <div class="icon">${currentTab==='fav'?'⭐':'🔍'}</div>
      <p>${currentTab==='fav'
        ? '즐겨찾기한 병원이 없어요.<br>별표를 눌러 추가해보세요!'
        : '검색 결과가 없어요.'}</p>
    </div>`;
    return;
  }

  el.innerHTML = list.map(h => {
    const isFav = favorites.includes(h.id);
    const s = getStatus(h.hvec);
    const bedStr = h.hvec === null ? '?' : h.hvec;
    return `<div class="hospital-card ${isFav?'favorited':''}">
      <button class="star-btn ${isFav?'starred':''}" onclick="toggleFav('${h.id}',event)">${isFav?'★':'☆'}</button>
      <div class="hospital-info">
        <h3>${h.name}</h3>
        <p>${h.address||''}${h.tel?' · '+h.tel:''}</p>
      </div>
      <div class="bed-info">
        <div class="bed-count" style="color:${bedColor(h.hvec)}">${bedStr}</div>
        <div class="bed-label">가용병상</div>
      </div>
      <div class="status-badge ${s.cls}">${s.label}</div>
    </div>`;
  }).join('');

  updateFavCount();
}

function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg;
  el.classList.toggle('show', !!msg);
}

updateFavCount();
loadData();
setInterval(loadData, 3 * 60 * 1000);
</script>
</body>
</html>
