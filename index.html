<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구미차병원 응급실</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060910; --card:#0d1117; --card2:#131a24;
  --border:#1c2a3a; --main:#3b9eff;
  --green:#22d47a; --orange:#ffaa00; --red:#ff4466;
  --text:#ddeeff; --text2:#6a8aaa; --text3:#2d4055;
  --mono:'DM Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 30%,rgba(59,158,255,0.05) 0%,transparent 70%);pointer-events:none;}

.wrap{position:relative;width:100%;max-width:480px;padding:40px 20px 60px;}

/* 병원명 */
.hosp-name{text-align:center;margin-bottom:32px;}
.hosp-name h1{font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.3px;}
.hosp-name h1 span{color:var(--main);}
.hosp-name p{font-size:12px;color:var(--text2);margin-top:6px;font-family:var(--mono);}

/* 상태 뱃지 */
.status-wrap{display:flex;justify-content:center;margin-bottom:28px;}
.status-badge{padding:7px 22px;border-radius:30px;font-size:14px;font-weight:700;font-family:var(--mono);letter-spacing:0.5px;}
.s-green{background:rgba(34,212,122,0.12);color:var(--green);border:1px solid rgba(34,212,122,0.3);}
.s-orange{background:rgba(255,170,0,0.12);color:var(--orange);border:1px solid rgba(255,170,0,0.3);}
.s-red{background:rgba(255,68,102,0.12);color:var(--red);border:1px solid rgba(255,68,102,0.3);}
.s-gray{background:rgba(100,130,160,0.1);color:var(--text2);border:1px solid var(--border);}

/* 메인 숫자 카드 2개 */
.main-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.main-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 20px;text-align:center;position:relative;overflow:hidden;}
.main-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.main-card.beds::before{background:linear-gradient(90deg,var(--main),transparent);}
.main-card.patients::before{background:linear-gradient(90deg,var(--orange),transparent);}
.mc-label{font-size:12px;color:var(--text2);margin-bottom:12px;}
.mc-val{font-family:var(--mono);font-size:48px;font-weight:500;line-height:1;}
.mc-unit{font-size:13px;color:var(--text3);margin-top:6px;}

/* 그래프 */
.graph-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;}
.graph-label{font-size:12px;color:var(--text2);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.graph-label span{font-family:var(--mono);font-size:11px;color:var(--text3);}
.graph-wrap{position:relative;height:110px;}
.graph-wrap canvas{position:absolute;inset:0;width:100%;height:100%;}
.graph-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text3);}

/* 하단 정보 */
.info-row{display:flex;justify-content:space-between;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:12px;}
.info-left{font-size:13px;color:var(--text2);}
.info-right{font-size:13px;color:var(--text);font-family:var(--mono);}

/* 새로고침 */
.bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.updated{font-size:11px;color:var(--text3);font-family:var(--mono);}
.updated b{color:var(--text2);}
.refresh-btn{display:flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s;}
.refresh-btn:hover{border-color:var(--main);color:var(--main);}
.refresh-btn.spinning .ri{animation:spin 0.8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}

.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:4px;vertical-align:middle;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.err{background:rgba(255,68,102,0.1);border:1px solid rgba(255,68,102,0.25);border-radius:10px;padding:12px 16px;font-size:12px;color:#ff8899;margin-bottom:14px;display:none;}
.err.show{display:block;}
</style>
</head>
<body>
<div class="wrap">

  <div class="hosp-name">
    <h1>🏥 <span>구미차병원</span> 응급실</h1>
    <p><span class="live-dot"></span>경북 구미시 신시로 10 · 054-450-9700</p>
  </div>

  <div class="status-wrap">
    <div class="status-badge s-gray" id="statusBadge">불러오는 중...</div>
  </div>

  <div class="err" id="errBox"></div>

  <div class="main-cards">
    <div class="main-card beds">
      <div class="mc-label">응급실 가용병상</div>
      <div class="mc-val" id="valBeds" style="color:var(--text3)">—</div>
      <div class="mc-unit">개 남음</div>
    </div>
    <div class="main-card patients">
      <div class="mc-label">현재 응급실 환자</div>
      <div class="mc-val" id="valPatients" style="color:var(--text3)">—</div>
      <div class="mc-unit">명</div>
    </div>
  </div>

  <div class="graph-section">
    <div class="graph-label">
      가용병상 추이
      <span id="graphSub">데이터 수집 중...</span>
    </div>
    <div class="graph-wrap" id="graphWrap">
      <canvas id="graphCanvas"></canvas>
      <div class="graph-empty" id="graphEmpty">3분마다 자동 갱신돼요 📈</div>
    </div>
  </div>

  <div class="info-row">
    <div class="info-left">📍 주소</div>
    <div class="info-right">경북 구미시 신시로 10</div>
  </div>
  <div class="info-row">
    <div class="info-left">📞 응급실 전화</div>
    <div class="info-right">054-450-9700</div>
  </div>

  <div class="bottom">
    <div class="updated">갱신: <b id="updatedTime">—</b></div>
    <button class="refresh-btn" id="refreshBtn" onclick="load()">
      <span class="ri">↻</span> 새로고침
    </button>
  </div>

</div>
<script>
const API_KEY = '1ae147a1907296a5c5fd16751a21b2f146381a4727784592ae9c235d8ac0263d';
const BASE = 'https://apis.data.go.kr/B552657/ErmctInfoInqireService';
const KEYWORD = '구미차병원';
const HISTORY = {time:[], beds:[]};

const bedColor = n => n===null?'var(--text3)':n===0?'var(--red)':n<=3?'var(--orange)':'var(--green)';

function getStatus(n) {
  if (n===null) return {label:'정보없음', cls:'s-gray'};
  if (n===0)    return {label:'🔴 만실', cls:'s-red'};
  if (n<=3)     return {label:'🟡 혼잡', cls:'s-orange'};
  return           {label:'🟢 여유', cls:'s-green'};
}

async function fetchData() {
  // 가용병상 (실시간)
  const url1 = `${BASE}/getEmrrmRltmUsefulSckbdInfoInqire?serviceKey=${encodeURIComponent(API_KEY)}&STAGE1=${encodeURIComponent('경상북도')}&pageNo=1&numOfRows=100`;
  const res1 = await fetch(url1);
  const txt1 = await res1.text();
  const xml1 = new DOMParser().parseFromString(txt1, 'text/xml');

  let beds = null, patients = null;

  xml1.querySelectorAll('item').forEach(item => {
    const g = t => item.querySelector(t)?.textContent?.trim()||'';
    const name = g('dutyName').replace(/\s/g,'');
    if (name.includes(KEYWORD.replace(/\s/g,''))) {
      const hvec = parseInt(g('hvec')); // 가용병상
      const hvs3 = parseInt(g('hvs3')); // 응급실 환자수 (일반)
      beds     = isNaN(hvec)?null:hvec;
      patients = isNaN(hvs3)?null:hvs3;
    }
  });

  return {beds, patients};
}

function drawGraph() {
  const canvas = document.getElementById('graphCanvas');
  const empty  = document.getElementById('graphEmpty');
  const sub    = document.getElementById('graphSub');

  if (HISTORY.beds.length < 2) {
    empty.style.display='flex';
    return;
  }
  empty.style.display='none';
  sub.textContent=`최근 ${HISTORY.beds.length}회`;

  const dpr = window.devicePixelRatio||1;
  const rect = canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr; canvas.height=rect.height*dpr;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  const data=HISTORY.beds.map(v=>v===null?0:v);
  const max=Math.max(...data,5);
  const pad={t:10*dpr,r:10*dpr,b:20*dpr,l:28*dpr};
  const gw=W-pad.l-pad.r, gh=H-pad.t-pad.b;

  // 그리드
  ctx.strokeStyle='rgba(28,42,58,0.9)'; ctx.lineWidth=1;
  [0,0.5,1].forEach(f=>{
    const y=pad.t+gh*(1-f);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle='rgba(100,130,160,0.5)';
    ctx.font=`${9*dpr}px DM Mono`; ctx.textAlign='right';
    ctx.fillText(Math.round(max*f),pad.l-3,y+3);
  });

  const pts=data.map((v,i)=>({
    x:pad.l+(data.length===1?gw/2:i/(data.length-1)*gw),
    y:pad.t+gh*(1-v/max),
  }));

  // 채우기
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+gh);
  grad.addColorStop(0,'rgba(59,158,255,0.25)'); grad.addColorStop(1,'rgba(59,158,255,0)');
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,pad.t+gh); ctx.lineTo(pts[0].x,pad.t+gh);
  ctx.closePath(); ctx.fillStyle=grad; ctx.fill();

  // 선
  ctx.beginPath(); ctx.strokeStyle='#3b9eff'; ctx.lineWidth=2*dpr; ctx.lineJoin='round';
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.stroke();

  // 점
  pts.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,3*dpr,0,Math.PI*2);
    ctx.fillStyle='#3b9eff'; ctx.fill();
  });

  // 시간
  ctx.fillStyle='rgba(100,130,160,0.6)'; ctx.font=`${8*dpr}px DM Mono`; ctx.textAlign='center';
  [0,Math.floor((HISTORY.time.length-1)/2),HISTORY.time.length-1].forEach(i=>{
    if(HISTORY.time[i]&&pts[i]) ctx.fillText(HISTORY.time[i],pts[i].x,H-2);
  });
}

async function load() {
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('errBox').classList.remove('show');

  try {
    const {beds, patients} = await fetchData();

    // 병상 수
    const bedsEl = document.getElementById('valBeds');
    bedsEl.textContent = beds??'?';
    bedsEl.style.color = bedColor(beds);

    // 환자 수
    const patEl = document.getElementById('valPatients');
    patEl.textContent = patients??'?';
    patEl.style.color = patients===null?'var(--text3)':'var(--orange)';

    // 상태 뱃지
    const s=getStatus(beds);
    const badge=document.getElementById('statusBadge');
    badge.textContent=s.label;
    badge.className='status-badge '+s.cls;

    // 그래프 기록
    const now=new Date();
    const ts=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    HISTORY.time.push(ts); HISTORY.beds.push(beds);
    if(HISTORY.time.length>20){HISTORY.time.shift();HISTORY.beds.shift();}
    drawGraph();

    document.getElementById('updatedTime').textContent=new Date().toLocaleTimeString('ko-KR');

    if(beds===null && patients===null){
      document.getElementById('errBox').textContent='⚠️ 데이터를 받지 못했어요. API 승인 중이거나 병원이 현재 데이터를 전송하지 않을 수 있어요.';
      document.getElementById('errBox').classList.add('show');
    }
  } catch(e) {
    document.getElementById('errBox').textContent='⚠️ 불러오기 실패. 잠시 후 새로고침해보세요.';
    document.getElementById('errBox').classList.add('show');
  }

  btn.classList.remove('spinning');
}

load();
setInterval(load, 3*60*1000);
window.addEventListener('resize', drawGraph);
</script>
</body>
</html>
